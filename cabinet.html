<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Кабинет команды — Contab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #F2F1EC;
  --surface: #FFFFFF;
  --surface2:#EDECEA;
  --surface3:#E6E4DF;
  --border:  rgba(30,30,50,0.09);
  --text:    #1A1828;
  --muted:   #888898;
  --accent:  #5561FF;
  --danger:  #D43A3A;
  --success: #1B9B52;

  --tc: var(--accent);
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed;
  top: -100px; right: -100px;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(85,97,255,0.06) 0%, transparent 65%);
  pointer-events: none;
}

/* Header */
.header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(242,241,236,0.88);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}
.logo-img {
  height: 30px;
  width: auto;
  display: block;
}
.team-badge {
  background: rgba(200,240,96,0.1);
  border: 1px solid rgba(200,240,96,0.2);
  color: var(--tc);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 20px;
  transition: all 0.3s;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}
.month-selector {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 6px 12px;
}
.month-selector select {
  background: transparent;
  border: none;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  outline: none;
  cursor: pointer;
}
.month-selector select option { background: var(--surface); }
.btn-logout {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  padding: 6px 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-logout:hover { border-color: var(--danger); color: var(--danger); }

/* Main layout */
.main {
  display: grid;
  grid-template-columns: 320px 1fr;
  height: calc(100vh - 60px);
}

/* Left panel — company list */
.sidebar {
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 20px 0;
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.sidebar-header {
  padding: 0 20px 16px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 8px;
}
.sidebar-title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}
.search-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  outline: none;
}
.search-input::placeholder { color: var(--muted); }
.search-input:focus { border-color: var(--tc); }

.company-item {
  padding: 10px 20px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.company-item:hover { background: var(--surface); }
.company-item.active {
  background: var(--surface2);
  border-left: 2px solid var(--tc);
}
.company-name {
  font-size: 13px;
  font-weight: 400;
  color: var(--text);
  line-height: 1.4;
  flex: 1;
}
.company-progress {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 3px;
  flex-shrink: 0;
}
.company-progress-label {
  font-size: 11px;
  color: var(--muted);
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
}
.company-progress-bar {
  width: 48px;
  height: 3px;
  background: var(--surface3);
  border-radius: 2px;
  overflow: hidden;
}
.company-progress-fill {
  height: 100%;
  border-radius: 2px;
  background: var(--tc);
  transition: width 0.3s ease;
}
.company-progress-fill.full { background: var(--success); }
.company-progress-fill.zero { background: var(--muted); opacity: 0.4; }

/* Right panel — report form */
.content {
  overflow-y: auto;
  padding: 32px;
}
.content::-webkit-scrollbar { width: 4px; }
.content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Team overview dashboard */
.team-ov {
  max-width: 800px;
}
.team-ov-header {
  margin-bottom: 24px;
}
.team-ov-header h2 {
  font-family: 'Inter', sans-serif;
  font-size: 22px; font-weight: 700;
  margin-bottom: 4px;
}
.team-ov-header p {
  font-size: 13px; color: var(--muted); font-weight: 300;
}
.team-ov-kpis {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}
.ov-kpi-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  text-align: center;
}
.ov-kpi-val {
  font-family: 'Inter', sans-serif;
  font-size: 30px; font-weight: 700;
  margin-bottom: 4px;
  line-height: 1;
}
.ov-kpi-label {
  font-size: 11px; color: var(--muted); font-weight: 300;
}
.ov-progress-wrap {
  height: 5px;
  background: var(--surface2);
  border-radius: 3px;
  margin-bottom: 28px;
  overflow: hidden;
}
.ov-progress-bar {
  height: 100%;
  border-radius: 3px;
  background: var(--tc);
  transition: width 0.5s ease;
}
.ov-section-title {
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 10px;
}
.ov-deadline-list {
  display: flex; flex-direction: column; gap: 6px;
}
.ov-deadline-item {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  cursor: pointer;
  transition: all 0.15s;
}
.ov-deadline-item:hover {
  border-color: var(--tc);
  background: var(--surface2);
}
.ov-deadline-co {
  font-size: 13px; font-weight: 400;
}
.ov-deadline-info {
  display: flex; flex-direction: column; align-items: flex-end; gap: 2px;
}
.ov-deadline-date {
  font-size: 11px; color: var(--muted);
  font-weight: 500;
}
.ov-deadline-date.urgent { color: var(--danger); }
.ov-deadline-types {
  font-size: 10px; color: var(--muted); font-weight: 300;
}
.ov-empty {
  text-align: center;
  color: var(--muted);
  font-size: 13px;
  font-weight: 300;
  padding: 24px 0;
}

.company-header {
  margin-bottom: 28px;
}
.company-header h1 {
  font-family: 'Inter', sans-serif;
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 4px;
}
.company-header p {
  font-size: 13px;
  color: var(--muted);
  font-weight: 300;
}

.reports-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 12px;
}

.report-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}
.report-card:hover {
  border-color: rgba(200,240,96,0.2);
  background: var(--surface2);
}
.report-card.submitted {
  border-color: rgba(27,155,82,0.2);
}
.report-card.submitted::after {
  content: '✓';
  position: absolute;
  top: 12px; right: 14px;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: rgba(27,155,82,0.1);
  color: var(--success);
  font-size: 11px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
}
.report-name {
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 8px;
  padding-right: 28px;
}
.report-deadline {
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 10px;
}
.report-deadline.overdue    { color: var(--danger); }
.report-deadline.no-deadline{ color: var(--muted); font-style: italic; }
.report-status { font-size: 12px; font-weight: 500; }
.report-status.done    { color: var(--success); }
.report-status.pending { color: var(--muted); }

/* Внеплановые отчёты */
.unplanned-header {
  font-size: 11px; font-weight: 600; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--muted);
  padding: 24px 0 8px;
}
.unplanned-card { border-color: rgba(98,0,160,0.2); }
.unplanned-tag {
  font-size: 9px; font-weight: 600; letter-spacing: 0.08em;
  text-transform: uppercase; color: #6200A0;
  background: rgba(98,0,160,0.08); border: 1px solid rgba(98,0,160,0.2);
  border-radius: 4px; padding: 2px 6px; margin-left: 6px; vertical-align: middle;
}
.btn-add-unplanned {
  display: block; margin: 16px 0 32px;
  background: transparent; border: 1px dashed rgba(98,0,160,0.3);
  color: #6200A0; border-radius: 12px; padding: 12px 20px;
  font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.2s; width: 100%;
}
.btn-add-unplanned:hover {
  background: rgba(98,0,160,0.06); border-color: rgba(98,0,160,0.5);
}

/* Submit Modal */
.modal-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(230,228,220,0.88);
  backdrop-filter: blur(10px);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-backdrop.active { display: flex; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 32px;
  width: 100%;
  max-width: 480px;
  animation: slideIn 0.2s ease;
}
@keyframes slideIn {
  from { opacity:0; transform: translateY(16px); }
  to   { opacity:1; transform: translateY(0); }
}
.modal-top-bar {
  height: 3px;
  border-radius: 2px;
  background: var(--tc);
  margin-bottom: 24px;
}
.modal h2 {
  font-family: 'Inter', sans-serif;
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 4px;
}
.modal-company {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 24px;
  font-weight: 300;
}

.field { margin-bottom: 18px; }
.field label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}
.field .field-hint {
  font-size: 11px;
  color: var(--muted);
  font-weight: 300;
  margin-top: 5px;
}
.field input[type=date],
.field input[type=text] {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 11px 14px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
  color-scheme: light;
}
.field input:focus { border-color: var(--tc); }

/* File drop zone */
.file-zone {
  border: 1.5px dashed var(--border);
  border-radius: 12px;
  padding: 28px 20px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}
.file-zone:hover, .file-zone.dragover {
  border-color: var(--tc);
  background: rgba(85,97,255,0.03);
}
.file-zone input[type=file] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
  width: 100%;
  height: 100%;
}
.file-zone-icon { font-size: 28px; margin-bottom: 8px; opacity: 0.4; }
.file-zone-text { font-size: 13px; color: var(--muted); font-weight: 300; }
.file-zone-name { font-size: 13px; color: var(--tc); font-weight: 500; margin-top: 6px; }

.modal-actions {
  display: flex;
  gap: 10px;
  margin-top: 24px;
}
.btn {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-primary {
  background: var(--tc);
  color: #FFFFFF;
}
.btn-primary:hover { opacity: 0.85; }
.btn-primary:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.btn-secondary {
  background: var(--surface2);
  color: var(--muted);
  border: 1px solid var(--border);
}
.btn-secondary:hover { color: var(--text); }

.spinner {
  display: none;
  width: 16px; height: 16px;
  border: 2px solid rgba(30,30,60,0.15);
  border-top-color: #FFFFFF;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  margin: 0 auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 20px;
  font-size: 14px;
  font-weight: 500;
  opacity: 0;
  pointer-events: none;
  transition: all 0.3s;
  z-index: 300;
  white-space: nowrap;
  box-shadow: 0 4px 20px rgba(30,30,60,0.08);
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
.toast.success { border-color: rgba(27,155,82,0.3); color: var(--success); }
.toast.error   { border-color: rgba(212,58,58,0.3); color: var(--danger); }

/* Loading overlay */
.loading-overlay {
  position: fixed;
  inset: 0;
  background: rgba(220,218,210,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 400;
}
.loading-overlay.hidden { display: none; }
.loading-spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--tc);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
</style>
</head>
<body>

<div class="loading-overlay" id="loading-overlay">
  <div class="loading-spinner"></div>
</div>

<header class="header">
  <div class="header-left">
    <img src="logo02.png" alt="Contab" class="logo-img">
    <div class="team-badge" id="team-badge">...</div>
  </div>
  <div class="header-right">
    <div class="month-selector">
      <span style="font-size:12px;color:var(--muted)">Период:</span>
      <select id="month-sel" onchange="loadData()"></select>
      <select id="year-sel" onchange="loadData()"></select>
    </div>
    <button class="btn-logout" onclick="logout()">Выйти</button>
  </div>
</header>

<div class="main">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Компании</div>
      <input class="search-input" type="text" placeholder="Поиск..." id="search" oninput="filterCompanies()">
    </div>
    <div id="company-list"></div>
  </aside>

  <main class="content" id="content">
    <!-- filled by renderTeamOverview() on load, replaced by renderReports() on company select -->
  </main>
</div>

<!-- Submit Modal -->
<div class="modal-backdrop" id="modal">
  <div class="modal">
    <div class="modal-top-bar"></div>
    <h2 id="modal-report-name">НДФЛ</h2>
    <div class="modal-company" id="modal-company-name">ООО «...»</div>

    <div class="field">
      <label>Дата фактической отправки отчёта</label>
      <input type="date" id="report-date" />
      <div class="field-hint">Дата, когда отчёт был реально отправлен в налоговую</div>
    </div>

    <div class="field">
      <label>Файл подтверждения</label>
      <div class="file-zone" id="file-zone">
        <input type="file" id="file-input" onchange="handleFile(this)">
        <div class="file-zone-icon">⬆</div>
        <div class="file-zone-text">Нажмите или перетащите файл сюда</div>
        <div class="file-zone-name" id="file-name-display"></div>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
      <button class="btn btn-primary" id="submit-btn" onclick="submitReport()">
        <span id="submit-label">Отправить</span>
        <div class="spinner" id="submit-spinner"></div>
      </button>
    </div>
  </div>
</div>

<!-- Модал внепланового отчёта -->
<div class="modal-backdrop" id="modal-unplanned">
  <div class="modal">
    <div class="modal-top-bar" style="background:#6200A0"></div>
    <h2>Внеплановый отчёт</h2>
    <p id="unplan-company-name" style="color:var(--muted);font-size:13px;margin-bottom:20px;font-weight:300"></p>

    <div class="field">
      <label>Тип отчёта</label>
      <select id="unplan-type" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;outline:none" onchange="toggleCustomType()">
        <option value="">— выберите тип —</option>
      </select>
    </div>

    <div class="field" id="unplan-custom-field" style="display:none">
      <label>Название отчёта</label>
      <input type="text" id="unplan-custom" placeholder="Введите название">
    </div>

    <div class="field">
      <label>Дата фактической отправки</label>
      <input type="date" id="unplan-date" style="color-scheme:light">
    </div>

    <div class="field">
      <label>Файл (необязательно)</label>
      <div class="file-zone" id="unplan-file-zone" onclick="document.getElementById('unplan-file-input').click()">
        <input type="file" id="unplan-file-input" style="display:none" onchange="handleUnplanFile(this)">
        <div class="file-zone-icon">📎</div>
        <div class="file-zone-text">Нажмите чтобы прикрепить файл</div>
        <div class="file-zone-name" id="unplan-file-name"></div>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeUnplannedModal()">Отмена</button>
      <button class="btn btn-primary" style="background:#6200A0" onclick="submitUnplanned()">Отправить</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="config.js"></script>
<script>
const API_URL = CONTAB_CONFIG.apiUrl;

function fetchWithTimeout(url, options = {}, ms = 15000) {
  const ctrl  = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), ms);
  // credentials:'omit' — не посылаем куки, иначе Apps Script делает редирект и CORS ломается
  // Content-Type убираем из POST — text/plain не вызывает preflight
  const opts  = { credentials: 'omit', ...options, signal: ctrl.signal };
  if (opts.headers && opts.headers['Content-Type'] === 'application/json') {
    delete opts.headers['Content-Type'];
  }
  return fetch(url, opts).finally(() => clearTimeout(timer));
}

const TEAM_COLORS = {
  orion: '#3A7A00', kepler: '#8B5C00',
  mir: '#005FA0', alphac: '#6200A0'
};
const TEAM_NAMES = {
  orion: 'Орион', kepler: 'Кеплер', mir: 'Мир', alphac: 'AlphaC'
};

let currentTeam = '';
let companies = [];
let reportTypes      = [];
let reportMatrix     = {};
let deadlineCalendar = {};
let records = {};
let selectedCompany = null;
let selectedReport = null;
let selectedFile = null;

// ─── Init ────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  const auth = sessionStorage.getItem('auth');
  const team = sessionStorage.getItem('team');
  if (auth !== 'ok' || !team || team === 'admin') {
    window.location.href = 'index.html';
    return;
  }

  currentTeam = team;
  const color = TEAM_COLORS[team] || '#5561FF';
  document.documentElement.style.setProperty('--tc', color);
  document.getElementById('team-badge').textContent = TEAM_NAMES[team] || team;
  document.getElementById('team-badge').style.cssText =
    `background: ${color}14; border-color: ${color}35; color: ${color}`;

  initMonthSelector();
  await loadConfig();
  await loadData();
  showOverlay(false);
});

function initMonthSelector() {
  const mSel = document.getElementById('month-sel');
  const ySel = document.getElementById('year-sel');
  const months = ['Январь','Февраль','Март','Апрель','Май','Июнь',
                   'Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  months.forEach((m, i) => {
    const o = document.createElement('option');
    o.value = i + 1; o.textContent = m;
    mSel.appendChild(o);
  });
  const now = new Date();
  mSel.value = now.getMonth() + 1;

  const curY = now.getFullYear();
  for (let y = curY - 1; y <= curY + 1; y++) {
    const o = document.createElement('option');
    o.value = y; o.textContent = y;
    ySel.appendChild(o);
  }
  ySel.value = curY;
}

async function loadConfig() {
  try {
    const res = await fetchWithTimeout(`${API_URL}?action=getConfig`);
    const data = await res.json();
    reportTypes      = data.reportTypes || [];
    reportMatrix     = data.reportMatrix || {};
    deadlineCalendar = data.deadlineCalendar || {};
    const allCompanies = data.companies || {};
    companies = allCompanies[TEAM_NAMES[currentTeam]] || [];
    renderCompanyList();
  } catch(e) {
    showToast('Ошибка загрузки конфига: ' + e.message, 'error');
  }
}

function getCompanyReports(company) {
  const matrix = reportMatrix[company];
  return (matrix && matrix.length) ? matrix : reportTypes;
}

function getDeadlineForMonth(reportType, month) {
  const cal = deadlineCalendar[reportType];
  const v   = (cal && cal[String(month)]) || null;
  return (v && v.includes('.')) ? v : null;
}

function parseLocalDate(str) {
  if (!str) return null;
  const parts = String(str).split('-');
  if (parts.length === 3) return new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
  const d = new Date(str);
  return isNaN(d) ? null : d;
}

function parseDeadline(ddmm, month, year) {
  if (!ddmm || !ddmm.includes('.')) return null;
  const [dd, mm] = ddmm.split('.');
  const imm = parseInt(mm), iyear = parseInt(year), imonth = parseInt(month);
  return new Date(imm < imonth ? iyear + 1 : iyear, imm - 1, parseInt(dd));
}

async function loadData() {
  showOverlay(true);
  const month = document.getElementById('month-sel').value;
  const year  = document.getElementById('year-sel').value;
  try {
    const res = await fetchWithTimeout(`${API_URL}?action=getData&team=${TEAM_NAMES[currentTeam]}&month=${month}&year=${year}`);
    const data = await res.json();
    records = {};
    (data.records || []).forEach(r => {
      records[`${r.company}|${r.reportType}`] = r;
    });
    renderCompanyList();
    if (selectedCompany) renderReports(selectedCompany);
    else renderTeamOverview();
  } catch(e) {
    showToast('Ошибка загрузки данных', 'error');
  } finally {
    showOverlay(false);
  }
}

// ─── Team overview ───────────────────────────────────────────
function renderTeamOverview() {
  const month = parseInt(document.getElementById('month-sel').value);
  const year  = parseInt(document.getElementById('year-sel').value);
  const monthName = document.getElementById('month-sel')
    .options[document.getElementById('month-sel').selectedIndex]?.text || '';
  const today = new Date();
  const content = document.getElementById('content');

  let total = 0, done = 0, overdue = 0;
  companies.forEach(c => {
    const required = getCompanyReports(c);
    total += required.length;
    required.forEach(rt => {
      const rec = records[`${c}|${rt}`];
      if (rec?.date) {
        done++;
        const d = getDeadlineForMonth(rt, month);
        if (d) {
          const sub = parseLocalDate(rec.date);
          const dl  = parseDeadline(d, month, year);
          if (sub && dl && sub > dl) overdue++;
        }
      }
    });
  });
  const pending = total - done;
  const pct = total ? Math.round(done / total * 100) : 0;

  // Upcoming: pending reports with deadline within 14 days
  const upcoming = [];
  companies.forEach(company => {
    const required = getCompanyReports(company);
    const dueSoon = [];
    required.forEach(rt => {
      if (records[`${company}|${rt}`]) return;
      const d = getDeadlineForMonth(rt, month);
      if (!d) return;
      const dl = parseDeadline(d, month, year);
      if (!dl) return;
      const daysLeft = Math.round((dl - today) / 86400000);
      if (daysLeft <= 30) dueSoon.push({ rt, daysLeft, dateStr: d });
    });
    if (dueSoon.length) {
      dueSoon.sort((a, b) => a.daysLeft - b.daysLeft);
      upcoming.push({ company, reports: dueSoon, minDays: dueSoon[0].daysLeft });
    }
  });
  upcoming.sort((a, b) => a.minDays - b.minDays);

  const upcomingHtml = upcoming.length
    ? upcoming.map(({ company, reports, minDays }) => {
        const isUrgent = minDays <= 3;
        const types = reports.map(r => r.rt).join(', ');
        const label = minDays < 0
          ? 'просрочено'
          : minDays === 0 ? 'сегодня' : minDays + ' дн.';
        const esc = company.replace(/'/g, "\\'");
        return `<div class="ov-deadline-item" onclick="selectCompany('${esc}')">
          <div class="ov-deadline-co">${company}</div>
          <div class="ov-deadline-info">
            <div class="ov-deadline-date ${isUrgent ? 'urgent' : ''}">до ${reports[0].dateStr} · ${label}</div>
            <div class="ov-deadline-types">${reports.length} отч.: ${types.length > 45 ? types.slice(0, 45) + '…' : types}</div>
          </div>
        </div>`;
      }).join('')
    : '<div class="ov-empty">Нет отчётов с дедлайном в ближайшие 30 дней</div>';

  content.innerHTML = `
    <div class="team-ov">
      <div class="team-ov-header">
        <h2>${TEAM_NAMES[currentTeam]}</h2>
        <p>${monthName} ${year} · ${companies.length} компаний</p>
      </div>
      <div class="team-ov-kpis">
        <div class="ov-kpi-card">
          <div class="ov-kpi-val">${total}</div>
          <div class="ov-kpi-label">Всего отчётов</div>
        </div>
        <div class="ov-kpi-card">
          <div class="ov-kpi-val" style="color:var(--success)">${done}</div>
          <div class="ov-kpi-label">Сдано</div>
        </div>
        <div class="ov-kpi-card">
          <div class="ov-kpi-val" style="color:var(--muted)">${pending}</div>
          <div class="ov-kpi-label">Осталось</div>
        </div>
        <div class="ov-kpi-card">
          <div class="ov-kpi-val" style="color:var(--danger)">${overdue}</div>
          <div class="ov-kpi-label">Просрочено</div>
        </div>
      </div>
      <div class="ov-progress-wrap">
        <div class="ov-progress-bar" style="width:${pct}%"></div>
      </div>
      <div class="ov-section-title">Ближайшие дедлайны (30 дней)</div>
      <div class="ov-deadline-list">${upcomingHtml}</div>
    </div>`;
}

// ─── Company list ────────────────────────────────────────────
function renderCompanyList() {
  const q = document.getElementById('search').value.toLowerCase();
  const list = document.getElementById('company-list');
  list.innerHTML = '';

  const filtered = companies.filter(c => c.toLowerCase().includes(q));
  filtered.forEach(c => {
    const required = getCompanyReports(c);
    const done  = required.filter(rt => records[`${c}|${rt}`]).length;
    const total = required.length;

    const div = document.createElement('div');
    div.className = 'company-item' + (c === selectedCompany ? ' active' : '');
    const pct = total ? Math.round(done / total * 100) : 0;
    const fillClass = pct === 100 ? 'full' : pct === 0 ? 'zero' : '';
    div.innerHTML = `
      <div class="company-name">${c}</div>
      <div class="company-progress">
        <div class="company-progress-label">${done}/${total}</div>
        <div class="company-progress-bar">
          <div class="company-progress-fill ${fillClass}" style="width:${pct}%"></div>
        </div>
      </div>`;
    div.onclick = () => selectCompany(c);
    list.appendChild(div);
  });
}

function filterCompanies() { renderCompanyList(); }

function selectCompany(name) {
  selectedCompany = name;
  renderCompanyList();
  renderReports(name);
}

// ─── Reports grid ────────────────────────────────────────────
function renderReports(company) {
  const month = document.getElementById('month-sel').value;
  const year  = document.getElementById('year-sel').value;
  const content = document.getElementById('content');

  const monthName = document.getElementById('month-sel')
    .options[document.getElementById('month-sel').selectedIndex].text;

  const required = getCompanyReports(company);

  content.innerHTML = `
    <div class="company-header">
      <h1>${company}</h1>
      <p>${monthName} ${year} · ${required.length} отчётов</p>
    </div>
    <div class="reports-grid" id="reports-grid"></div>`;

  const grid = document.getElementById('reports-grid');
  const today = new Date();

  required.forEach(rt => {
    const key = `${company}|${rt}`;
    const rec = records[key];
    const deadlineDDMM = getDeadlineForMonth(rt, month);
    const isSubmitted = !!rec;

    let deadlineLabel = '';
    let deadlineClass = '';
    if (deadlineDDMM && deadlineDDMM.includes('.')) {
      const [dd, mm] = deadlineDDMM.split('.');
      const idd = parseInt(dd), imm = parseInt(mm), imonth = parseInt(month), iyear = parseInt(year);
      const deadlineYear = imm < imonth ? iyear + 1 : iyear;
      const deadlineDate = new Date(deadlineYear, imm - 1, idd);
      deadlineLabel = `Срок: ${dd}.${mm}`;
      if (!isSubmitted) {
        const todayMidnight = new Date(today.getFullYear(), today.getMonth(), today.getDate());
        if (todayMidnight > deadlineDate) {
          deadlineClass = 'overdue';
          deadlineLabel += ' — просрочен';
        }
      }
    } else {
      deadlineLabel = 'Без дедлайна в этом месяце';
      deadlineClass = 'no-deadline';
    }

    const card = document.createElement('div');
    card.className = 'report-card' + (isSubmitted ? ' submitted' : '');
    card.innerHTML = `
      <div class="report-name">${rt}</div>
      <div class="report-deadline ${deadlineClass}">${deadlineLabel}</div>
      <div class="report-status ${isSubmitted ? 'done' : 'pending'}">
        ${isSubmitted
          ? `<a href="${rec.fileUrl || '#'}" target="_blank" style="color:var(--success);text-decoration:none" title="Открыть файл">
              Сдан ${formatDate(rec.date)}
             </a>`
          : 'Ожидает отправки'}
      </div>`;
    card.onclick = () => openModal(company, rt, rec);
    grid.appendChild(card);
  });

  // Внеплановые отчёты
  const unplanned = Object.values(records).filter(r => r.company === company && (r.isUnplanned === true || r.isUnplanned === 'да'));
  if (unplanned.length) {
    const upHeader = document.createElement('div');
    upHeader.className = 'unplanned-header';
    upHeader.textContent = 'Внеплановые отчёты';
    content.appendChild(upHeader);

    const upGrid = document.createElement('div');
    upGrid.className = 'reports-grid';
    unplanned.forEach(r => {
      const card = document.createElement('div');
      card.className = 'report-card submitted unplanned-card';
      card.innerHTML = `
        <div class="report-name">${r.reportType} <span class="unplanned-tag">внеплановый</span></div>
        <div class="report-status done">
          <a href="${r.fileUrl || '#'}" target="_blank" style="color:var(--success);text-decoration:none">
            Сдан ${formatDate(r.date)}
          </a>
        </div>`;
      upGrid.appendChild(card);
    });
    content.appendChild(upGrid);
  }

  const addBtn = document.createElement('button');
  addBtn.className = 'btn-add-unplanned';
  addBtn.innerHTML = '+ Внеплановый отчёт';
  addBtn.onclick = () => openUnplannedModal(company);
  content.appendChild(addBtn);
}

function formatDate(d) {
  if (!d) return '';
  const dt = new Date(d);
  return isNaN(dt) ? d : dt.toLocaleDateString('ru-RU');
}

// ─── Submit Modal ────────────────────────────────────────────
function openModal(company, reportType, existing) {
  selectedReport = reportType;
  selectedFile = null;
  document.getElementById('modal-report-name').textContent = reportType;
  document.getElementById('modal-company-name').textContent = company;
  document.getElementById('file-name-display').textContent = '';
  document.getElementById('file-input').value = '';

  const fmt = d => d.toISOString().split('T')[0];
  document.getElementById('report-date').value = existing?.date
    ? fmt(new Date(existing.date))
    : fmt(new Date());

  document.getElementById('modal').classList.add('active');
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
  selectedFile = null;
}

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// Drag & drop
const zone = document.getElementById('file-zone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
zone.addEventListener('drop', e => {
  e.preventDefault();
  zone.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) setFile(file);
});

function handleFile(input) {
  if (input.files[0]) setFile(input.files[0]);
}
function setFile(file) {
  selectedFile = file;
  document.getElementById('file-name-display').textContent = file.name;
}

async function submitReport() {
  const date = document.getElementById('report-date').value;
  if (!date) { showToast('Укажите дату', 'error'); return; }

  setSubmitting(true);

  try {
    let fileData = null;
    let fileName = null;
    let fileType = null;

    if (selectedFile) {
      fileData = await fileToBase64(selectedFile);
      fileName = selectedFile.name;
      fileType = selectedFile.type || 'application/octet-stream';
    }

    const month = document.getElementById('month-sel').value;
    const year  = document.getElementById('year-sel').value;

    const body = {
      action: 'submitReport',
      team: TEAM_NAMES[currentTeam],
      company: selectedCompany,
      reportType: selectedReport,
      date,
      fileData,
      fileName,
      fileType,
      month: parseInt(month),
      year: parseInt(year)
    };

    // mode:'no-cors' — единственный способ отправить POST к Apps Script с GitHub Pages.
    // Ответ будет opaque (нечитаемый), поэтому обновляем данные перезагрузкой.
    await fetch(API_URL, {
      method: 'POST',
      mode: 'no-cors',
      credentials: 'omit',
      body: JSON.stringify(body)
    });

    // Оптимистично обновляем UI сразу
    records[`${selectedCompany}|${selectedReport}`] = {
      company: selectedCompany, team: TEAM_NAMES[currentTeam],
      reportType: selectedReport, date,
      fileUrl: '', fileName: fileName || '', isUnplanned: false
    };
    closeModal();
    renderReports(selectedCompany);
    renderCompanyList();
    showToast('Отчёт отправлен — синхронизируем…', 'success');

    // Перезагружаем данные из таблицы через 4 сек чтобы получить актуальный fileUrl
    setTimeout(() => loadData(), 4000);

  } catch(e) {
    showToast('Ошибка: ' + e.message, 'error');
  } finally {
    setSubmitting(false);
  }
}

function fileToBase64(file) {
  return new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = e => res(e.target.result.split(',')[1]);
    reader.onerror = rej;
    reader.readAsDataURL(file);
  });
}

function setSubmitting(on) {
  document.getElementById('submit-btn').disabled = on;
  document.getElementById('submit-label').style.display = on ? 'none' : 'inline';
  document.getElementById('submit-spinner').style.display = on ? 'block' : 'none';
}

// ─── Helpers ─────────────────────────────────────────────────
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type}`;
  setTimeout(() => t.className = 'toast', 3500);
}

function showOverlay(show) {
  document.getElementById('loading-overlay').classList.toggle('hidden', !show);
}

function logout() {
  sessionStorage.clear();
  window.location.href = 'index.html';
}

// ─── Внеплановый отчёт ───────────────────────────────────────
let unplannedCompany = null;
let unplannedFile    = null;

function openUnplannedModal(company) {
  unplannedCompany = company;
  unplannedFile    = null;

  const sel = document.getElementById('unplan-type');
  sel.innerHTML = '<option value="">— выберите тип —</option>';
  reportTypes.forEach(rt => {
    const o = document.createElement('option');
    o.value = rt; o.textContent = rt;
    sel.appendChild(o);
  });
  const oCustom = document.createElement('option');
  oCustom.value = '__custom__'; oCustom.textContent = 'Другой тип...';
  sel.appendChild(oCustom);

  document.getElementById('unplan-company-name').textContent = company;
  document.getElementById('unplan-custom').value = '';
  document.getElementById('unplan-custom-field').style.display = 'none';
  document.getElementById('unplan-file-name').textContent = '';
  document.getElementById('unplan-file-input').value = '';
  document.getElementById('unplan-date').value = new Date().toISOString().split('T')[0];

  document.getElementById('modal-unplanned').classList.add('active');
}

function closeUnplannedModal() {
  document.getElementById('modal-unplanned').classList.remove('active');
  unplannedCompany = null;
  unplannedFile    = null;
}

function toggleCustomType() {
  const val = document.getElementById('unplan-type').value;
  document.getElementById('unplan-custom-field').style.display =
    val === '__custom__' ? 'block' : 'none';
}

function handleUnplanFile(input) {
  if (input.files[0]) {
    unplannedFile = input.files[0];
    document.getElementById('unplan-file-name').textContent = unplannedFile.name;
  }
}

async function submitUnplanned() {
  const typeVal  = document.getElementById('unplan-type').value;
  const custom   = document.getElementById('unplan-custom').value.trim();
  const date     = document.getElementById('unplan-date').value;

  if (!typeVal) { showToast('Выберите тип отчёта', 'error'); return; }
  if (typeVal === '__custom__' && !custom) { showToast('Введите название', 'error'); return; }
  if (!date)    { showToast('Укажите дату', 'error'); return; }

  const label      = typeVal === '__custom__' ? custom : typeVal;
  const reportType = typeVal === '__custom__' ? 'Внеплановый' : typeVal;

  const month = parseInt(document.getElementById('month-sel').value);
  const year  = parseInt(document.getElementById('year-sel').value);

  let fileData = null, fileName = null, fileType = null;
  if (unplannedFile) {
    fileData = await fileToBase64(unplannedFile);
    fileName = unplannedFile.name;
    fileType = unplannedFile.type || 'application/octet-stream';
  }

  try {
    await fetch(API_URL, {
      method: 'POST',
      mode: 'no-cors',
      credentials: 'omit',
      body: JSON.stringify({
        action: 'submitReport',
        team: TEAM_NAMES[currentTeam],
        company: unplannedCompany,
        reportType, label,
        date, fileData, fileName, fileType,
        month, year, isUnplanned: true
      })
    });
    closeUnplannedModal();
    showToast('Внеплановый отчёт отправлен — синхронизируем…', 'success');
    setTimeout(() => loadData(), 4000);
  } catch(e) {
    showToast('Ошибка: ' + e.message, 'error');
  }
}

document.getElementById('modal-unplanned').addEventListener('click', function(e) {
  if (e.target === this) closeUnplannedModal();
});
</script>
